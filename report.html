<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Kobo Dashboard</title>
<style>
body { font-family: Arial; padding:20px; }
h2 { margin-bottom:5px; }
.controls { margin-bottom:15px; }
table { border-collapse: collapse; width:100%; }
th, td { border:1px solid #ddd; padding:6px; font-size:13px; }
th { background:#f2f2f2; }
.pagination { margin-top:10px; }
button { padding:5px 10px; margin-right:5px; }
</style>
</head>
<body>

<h2>Báo cáo dữ liệu Kobo</h2>
<div id="summary"></div>

<div class="controls">
<input type="text" id="searchInput" placeholder="Tìm kiếm...">
<select id="provinceFilter"></select>
<select id="districtFilter"></select>
<button onclick="resetFilter()">Reset</button>
</div>

<table>
<thead id="tableHead"></thead>
<tbody id="tableBody"></tbody>
</table>

<div class="pagination">
<button onclick="prevPage()">Prev</button>
<span id="pageInfo"></span>
<button onclick="nextPage()">Next</button>
</div>

<script>

let fullData = [];
let filteredData = [];
let columnsMeta = {};
let currentPage = 1;
let rowsPerPage = 10;

Promise.all([
fetch("data.json").then(res => res.json()),
fetch("columns.json").then(res => res.json())
]).then(([data, meta]) => {

fullData = data;
filteredData = data;
columnsMeta = meta;

initFilters();
renderTable();
updateSummary();
});

function initFilters() {

const provinces = [...new Set(fullData.map(d => d.tinh_tp).filter(Boolean))];
const districts = [...new Set(fullData.map(d => d.quan_huyen).filter(Boolean))];

const provinceSelect = document.getElementById("provinceFilter");
const districtSelect = document.getElementById("districtFilter");

provinceSelect.innerHTML = '<option value="">Tất cả tỉnh</option>';
districtSelect.innerHTML = '<option value="">Tất cả quận</option>';

provinces.sort().forEach(p => {
provinceSelect.innerHTML += `<option value="${p}">${p}</option>`;
});

districts.sort().forEach(d => {
districtSelect.innerHTML += `<option value="${d}">${d}</option>`;
});

provinceSelect.onchange = applyFilters;
districtSelect.onchange = applyFilters;
document.getElementById("searchInput").oninput = applyFilters;
}

function applyFilters() {

const search = document.getElementById("searchInput").value.toLowerCase();
const province = document.getElementById("provinceFilter").value;
const district = document.getElementById("districtFilter").value;

filteredData = fullData.filter(row => {

return (!province || row.tinh_tp === province)
&& (!district || row.quan_huyen === district)
&& Object.values(row).some(val =>
String(val ?? "").toLowerCase().includes(search)
);
});

currentPage = 1;
renderTable();
updateSummary();
}

function renderTable() {

const tableHead = document.getElementById("tableHead");
const tableBody = document.getElementById("tableBody");

tableHead.innerHTML = "";
tableBody.innerHTML = "";

if (filteredData.length === 0) return;

const columns = Object.keys(filteredData[0]);

let headerRow = "<tr>";
columns.forEach(col => {
headerRow += `<th>${columnsMeta[col] || col}</th>`;
});
headerRow += "</tr>";

tableHead.innerHTML = headerRow;

const start = (currentPage - 1) * rowsPerPage;
const pageData = filteredData.slice(start, start + rowsPerPage);

pageData.forEach(row => {
let rowHTML = "<tr>";
columns.forEach(col => {
rowHTML += `<td>${row[col] ?? ""}</td>`;
});
rowHTML += "</tr>";
tableBody.innerHTML += rowHTML;
});

document.getElementById("pageInfo").innerText =
`Trang ${currentPage} / ${Math.ceil(filteredData.length / rowsPerPage)}`;
}

function nextPage() {
if (currentPage < Math.ceil(filteredData.length / rowsPerPage)) {
currentPage++;
renderTable();
}
}

function prevPage() {
if (currentPage > 1) {
currentPage--;
renderTable();
}
}

function updateSummary() {
document.getElementById("summary").innerHTML =
`Tổng số hồ sơ: <b>${filteredData.length}</b>`;
}

function resetFilter() {
document.getElementById("searchInput").value = "";
document.getElementById("provinceFilter").value = "";
document.getElementById("districtFilter").value = "";
filteredData = fullData;
currentPage = 1;
renderTable();
updateSummary();
}

</script>
</body>
</html>
