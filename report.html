<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>DỰ ÁN DATA NHÀ CHỐNG LŨ</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
body{
font-family:'Segoe UI',Arial;
background:#f4f6f9;
padding:20px;
}

h2{margin-bottom:10px;}

.card{
background:white;
padding:15px 20px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
display:inline-block;
margin-bottom:20px;
}

.card h3{
margin:0;
font-size:14px;
color:#777;
}

.card .number{
font-size:22px;
font-weight:bold;
margin-top:5px;
}

.controls{
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
margin-bottom:15px;
}

select,input,button{
padding:6px;
margin-right:8px;
margin-bottom:5px;
}

button{
cursor:pointer;
background:#4CAF50;
color:white;
border:none;
border-radius:4px;
}

table{
border-collapse:collapse;
width:100%;
background:white;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

th,td{
border:1px solid #eee;
padding:6px;
font-size:13px;
position:relative;
}

th{background:#f2f2f2;}

.hidden-col{
display:none;
}

.download-btn{
padding:4px 8px;
background:#1976d2;
color:white;
border-radius:4px;
text-decoration:none;
font-size:12px;
}
</style>
</head>

<body>

<h2>DỰ ÁN DATA NHÀ CHỐNG LŨ (demo)</h2>

<div class="card">
<h3>Tổng hồ sơ</h3>
<div class="number" id="totalCount">0</div>
</div>

<div class="controls">

<input type="text" id="searchInput" placeholder="Tìm kiếm...">

<select id="natFilter"></select>
<select id="sponsorFilter"></select>
<select id="provinceFilter"></select>
<select id="districtFilter"></select>

<button onclick="resetFilter()">Reset</button>
<button onclick="exportExcel()">Xuất Excel</button>

</div>

<table>
<thead id="tableHead"></thead>
<tbody id="tableBody"></tbody>
</table>

<div style="margin-top:10px">
<button onclick="prevPage()">Prev</button>
<span id="pageInfo"></span>
<button onclick="nextPage()">Next</button>
</div>

<script>

let fullData=[];
let filteredData=[];
let columnsMeta={};
let hiddenColumns=new Set();
let currentPage=1;
let rowsPerPage=10;

Promise.all([
fetch("data.json?v="+new Date().getTime()).then(res=>res.json()),
fetch("columns.json?v="+new Date().getTime()).then(res=>res.json())
]).then(([data,meta])=>{

fullData=data;
filteredData=data;
columnsMeta=meta;

initFilters();
renderTable();
updateSummary();

});

function initFilters(){

const natList=[...new Set(fullData.map(d=>d.khu_vuc_nat).filter(Boolean))];
const sponsorList=[...new Set(fullData.map(d=>d.ho_tro_ten).filter(Boolean))];
const provinces=[...new Set(fullData.map(d=>d.tinh_tp).filter(Boolean))];
const districts=[...new Set(fullData.map(d=>d.quan_huyen).filter(Boolean))];

natFilter.innerHTML='<option value="">Khu vực NAT</option>';
sponsorFilter.innerHTML='<option value="">Nhà tài trợ</option>';
provinceFilter.innerHTML='<option value="">Tỉnh</option>';
districtFilter.innerHTML='<option value="">Quận</option>';

natList.sort().forEach(v=>natFilter.innerHTML+=`<option value="${v}">${v}</option>`);
sponsorList.sort().forEach(v=>sponsorFilter.innerHTML+=`<option value="${v}">${v}</option>`);
provinces.sort().forEach(v=>provinceFilter.innerHTML+=`<option value="${v}">${v}</option>`);
districts.sort().forEach(v=>districtFilter.innerHTML+=`<option value="${v}">${v}</option>`);

natFilter.onchange=applyFilters;
sponsorFilter.onchange=applyFilters;
provinceFilter.onchange=applyFilters;
districtFilter.onchange=applyFilters;
searchInput.oninput=applyFilters;

}

function applyFilters(){

const search=searchInput.value.toLowerCase();
const nat=natFilter.value;
const sponsor=sponsorFilter.value;
const province=provinceFilter.value;
const district=districtFilter.value;

filteredData=fullData.filter(row=>

(!nat||row.khu_vuc_nat===nat)
&&(!sponsor||row.ho_tro_ten===sponsor)
&&(!province||row.tinh_tp===province)
&&(!district||row.quan_huyen===district)
&&Object.values(row).some(val=>String(val??"").toLowerCase().includes(search))

);

currentPage=1;
renderTable();
updateSummary();

}

function renderTable(){

tableHead.innerHTML="";
tableBody.innerHTML="";

if(filteredData.length===0) return;

const columns=Object.keys(columnsMeta);

let header="<tr>";

columns.forEach(col=>{
const hidden=hiddenColumns.has(col)?"hidden-col":"";
header+=`<th class="${hidden}">${columnsMeta[col]||col}</th>`;
});

header+="</tr>";
tableHead.innerHTML=header;

const start=(currentPage-1)*rowsPerPage;
const pageData=filteredData.slice(start,start+rowsPerPage);

pageData.forEach(row=>{

let rowHTML="<tr>";

columns.forEach(col=>{

const hidden=hiddenColumns.has(col)?"hidden-col":"";
let cell=row[col]??"";

/* ===== HIỂN THỊ NÚT DOWNLOAD ===== */

if(col.endsWith("_URL") && cell){

cell=`<a class="download-btn" href="${cell}" target="_blank">⬇ Download</a>`;

}

rowHTML+=`<td class="${hidden}">${cell}</td>`;

});

rowHTML+="</tr>";

tableBody.innerHTML+=rowHTML;

});

pageInfo.innerText=`Trang ${currentPage} / ${Math.ceil(filteredData.length/rowsPerPage)}`;

}

function nextPage(){
if(currentPage<Math.ceil(filteredData.length/rowsPerPage)){
currentPage++;
renderTable();
}
}

function prevPage(){
if(currentPage>1){
currentPage--;
renderTable();
}
}

function updateSummary(){
totalCount.innerText=filteredData.length;
}

function resetFilter(){

searchInput.value="";
natFilter.value="";
sponsorFilter.value="";
provinceFilter.value="";
districtFilter.value="";

filteredData=fullData;
currentPage=1;

renderTable();
updateSummary();

}

function exportExcel(){

const columns=Object.keys(columnsMeta);

const dataToExport=filteredData.map(row=>{
let newRow={};
columns.forEach(col=>{
newRow[columnsMeta[col]]=row[col];
});
return newRow;
});

const worksheet=XLSX.utils.json_to_sheet(dataToExport);
const workbook=XLSX.utils.book_new();
XLSX.utils.book_append_sheet(workbook,worksheet,"Report");

XLSX.writeFile(workbook,"kobo_report.xlsx");

}

</script>

</body>
</html>
